<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Exercise 14.1</title>

<link rel="stylesheet"
      href="css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">

        Display and Visibility Example

    </h2>

    <div class="bg-primary
                text-white
                p-4
                mb-3
                d-none
                d-md-block">

        This section is hidden on mobile
        and visible from medium screens.

    </div>

    <div class="bg-success
                text-white
                p-4
                d-none
                d-lg-flex
                justify-content-center
                align-items-center">

        This section is hidden below large screens
        and displayed as FLEX on large screens.

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
