<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Exercise 9.2</title>

<link rel="stylesheet"
      href="css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">

        Button Groups & Toggle Buttons

    </h2>

    <h4>

        Button Group

    </h4>

    <div class="btn-group mb-4">

        <button class="btn btn-primary">
            Left
        </button>

        <button class="btn btn-success">
            Middle
        </button>

        <button class="btn btn-danger">
            Right
        </button>

    </div>

    <h4>

        Toggle Buttons

    </h4>

    <div class="btn-group" role="group">

        <input type="checkbox"
               class="btn-check"
               id="check1"
               autocomplete="off">

        <label class="btn btn-outline-primary"
               for="check1">

            Java

        </label>

        <input type="checkbox"
               class="btn-check"
               id="check2"
               autocomplete="off">

        <label class="btn btn-outline-success"
               for="check2">

            Python

        </label>

        <input type="checkbox"
               class="btn-check"
               id="check3"
               autocomplete="off">

        <label class="btn btn-outline-danger"
               for="check3">

            C++

        </label>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>s
