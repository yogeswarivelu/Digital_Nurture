<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Exercise 12.2</title>

<link rel="stylesheet"
      href="css/bootstrap.min.css">

</head>

<body>

<div class="container my-5">

    <h2 class="text-center mb-5">

        Pricing Plans

    </h2>

    <div class="row">

        <div class="col-md-4 mb-4">

            <div class="card
                        text-center
                        p-4">

                <h3>

                    Basic

                </h3>

                <h1 class="my-3">

                    ₹499

                </h1>

                <p>

                    5 Projects

                </p>

                <p>

                    Basic Support

                </p>

                <button class="btn btn-primary mt-3">

                    Choose Plan

                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card
                        text-center
                        p-4">

                <h3>

                    Standard

                </h3>

                <h1 class="my-3">

                    ₹999

                </h1>

                <p>

                    15 Projects

                </p>

                <p>

                    Priority Support

                </p>

                <button class="btn btn-success mt-3">

                    Choose Plan

                </button>

            </div>

        </div>

        <div class="col-md-4 mb-4">

            <div class="card
                        text-center
                        p-4">

                <h3>

                    Premium

                </h3>

                <h1 class="my-3">

                    ₹1499

                </h1>

                <p>

                    Unlimited Projects

                </p>

                <p>

                    24/7 Support

                </p>

                <button class="btn btn-danger mt-3">

                    Choose Plan

                </button>

            </div>

        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
