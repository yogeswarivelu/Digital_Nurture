<!DOCTYPE html>
<html lang="en">

<head>

<title>Exercise 12.1</title>

      href="css/bootstrap.min.css">

</head>

<body>

<div class="container">

    <h2 class="text-center mt-4">

        Spacing Utilities Example

    </h2>

    <div class="bg-primary
                text-white
                m-3
                p-2">

        Section 1

        <br>

        Uses:

        m-3 → margin

        p-2 → padding

    </div>

    <div class="bg-success
                text-white
                mt-4
                py-5">

        Section 2

        <br>

        Uses:

        mt-4 → top margin

        py-5 → vertical padding

    </div>

</div>
