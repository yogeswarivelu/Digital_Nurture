<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Exercise </title>

<link rel="stylesheet"
      href="css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
Reordering Columns

    </h2>

    <div class="row">

        <div class="col-md-6 order-md-2">

            <div class="bg-success
                        text-white
                        p-4
                        text-center">

                First Column in HTML

                <br>

                Appears SECOND on Desktop

            </div>

        </div>

        <div class="col-md-6 order-md-1">

            <div class="bg-danger
                        text-white
                        p-4
                        text-center">

                Second Column in HTML

                <br>

                Appears FIRST on Desktop

            </div>

        </div>

    </div>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
